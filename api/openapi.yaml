openapi: 3.0.2
info:
  title: Hevelius API
  version: v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter JWT token
  schemas:
    LoginResponse:
      type: object
      properties:
        status:
          type: boolean
        token:
          type: string
          description: JWT access token
        user_id:
          type: integer
        firstname:
          type: string
        lastname:
          type: string
        share:
          type: number
          format: float
        phone:
          type: string
        email:
          type: string
        permissions:
          type: integer
        aavso_id:
          type: string
        ftp_login:
          type: string
        ftp_pass:
          type: string
        msg:
          type: string
    Task:
      type: object
      properties:
        task_id:
          type: integer
          description: Task ID
        user_id:
          type: integer
          description: User ID
        aavso_id:
          type: string
          description: AAVSO identifier
        object:
          type: string
          description: Object name
        ra:
          type: number
          format: float
          description: Right Ascension
        decl:
          type: number
          format: float
          description: Declination
        exposure:
          type: number
          format: float
          description: Exposure time
        descr:
          type: string
          description: Description
        filter:
          type: string
          description: Filter type
        binning:
          type: integer
          description: Binning value
        guiding:
          type: boolean
          description: Guiding enabled
        dither:
          type: boolean
          description: Dithering enabled
        calibrate:
          type: boolean
          description: Calibration enabled
        solve:
          type: boolean
          description: Plate solving enabled
        other_cmd:
          type: string
          description: Additional commands
        min_alt:
          type: number
          format: float
          description: Minimum altitude
        moon_distance:
          type: number
          format: float
          description: Moon distance
        skip_before:
          type: string
          format: date-time
          description: Skip before date
        skip_after:
          type: string
          format: date-time
          description: Skip after date
        min_interval:
          type: integer
          description: Minimum interval
        comment:
          type: string
          description: Comment
        state:
          type: integer
          description: Task state
        scope_id:
          type: integer
          description: Telescope ID
        imagename:
          type: string
          description: Image filename
        created:
          type: string
          format: date-time
          description: Creation timestamp
        activated:
          type: string
          format: date-time
          description: Activation timestamp
        performed:
          type: string
          format: date-time
          description: Execution timestamp
        max_moon_phase:
          type: integer
          description: Maximum moon phase
        max_sun_alt:
          type: integer
          description: Maximum sun altitude
        auto_center:
          type: boolean
          description: Auto centering enabled
        calibrated:
          type: boolean
          description: Calibration status
        solved:
          type: boolean
          description: Plate solving status
        sent:
          type: boolean
          description: Sent status
        project_ids:
          type: array
          items:
            type: integer
          description: Project IDs this task belongs to
    TasksList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
          description: Total number of tasks
        page:
          type: integer
          description: Current page number
        per_page:
          type: integer
          description: Items per page
        pages:
          type: integer
          description: Total number of pages
    TaskGetResponse:
      type: object
      properties:
        task:
          $ref: '#/components/schemas/Task'
        status:
          type: boolean
          description: Operation status
        msg:
          type: string
          description: Status message
    VersionResponse:
      type: object
      properties:
        version:
          type: string
          description: Hevelius version number
    TaskUpdateResponse:
      type: object
      properties:
        status:
          type: boolean
          description: Operation status
        msg:
          type: string
          description: Status message
    Sensor:
      type: object
      properties:
        sensor_id:
          type: integer
          description: Sensor ID
        name:
          type: string
          description: Sensor name
        resx:
          type: integer
          description: Resolution in X axis (pixels)
        resy:
          type: integer
          description: Resolution in Y axis (pixels)
        pixel_x:
          type: number
          format: float
          description: Pixel size in X axis (microns)
        pixel_y:
          type: number
          format: float
          description: Pixel size in Y axis (microns)
        bits:
          type: integer
          description: Bit depth
        width:
          type: number
          format: float
          description: Sensor width (mm)
        height:
          type: number
          format: float
          description: Sensor height (mm)
        vendor:
          type: string
          description: Sensor/camera vendor
        url:
          type: string
          description: URL for sensor info
        active:
          type: boolean
          description: Whether the sensor is active
    SensorCreate:
      type: object
      required:
        - name
        - resx
        - resy
        - pixel_x
        - pixel_y
      properties:
        name:
          type: string
          maxLength: 128
          description: Sensor name
        resx:
          type: integer
          description: Resolution X (pixels)
        resy:
          type: integer
          description: Resolution Y (pixels)
        pixel_x:
          type: number
          format: float
          description: Pixel size X (microns)
        pixel_y:
          type: number
          format: float
          description: Pixel size Y (microns)
        bits:
          type: integer
          default: 0
          description: Bit depth (default 0 if omitted)
        width:
          type: number
          format: float
          description: Sensor width (mm); if omitted, computed as resx * pixel_x / 1000
        height:
          type: number
          format: float
          description: Sensor height (mm); if omitted, computed as resy * pixel_y / 1000
        vendor:
          type: string
          maxLength: 128
        url:
          type: string
          maxLength: 512
        active:
          type: boolean
          default: true
    SensorUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
        resx:
          type: integer
        resy:
          type: integer
        pixel_x:
          type: number
          format: float
        pixel_y:
          type: number
          format: float
        bits:
          type: integer
        width:
          type: number
          format: float
        height:
          type: number
          format: float
        vendor:
          type: string
          maxLength: 128
        url:
          type: string
          maxLength: 512
        active:
          type: boolean
    SensorResponse:
      type: object
      properties:
        status:
          type: boolean
        sensor_id:
          type: integer
        sensor:
          $ref: '#/components/schemas/Sensor'
        msg:
          type: string
    Filter:
      type: object
      properties:
        filter_id:
          type: integer
          description: Filter primary key
        short_name:
          type: string
          maxLength: 8
          description: Short name (e.g. SG, CV)
        full_name:
          type: string
          description: Full filter name
        url:
          type: string
          description: URL for filter info
        active:
          type: boolean
          description: Whether the filter is active
    FiltersList:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
    FilterCreate:
      type: object
      required:
        - short_name
      properties:
        short_name:
          type: string
          maxLength: 8
          description: Short name (e.g. SG, CV)
        full_name:
          type: string
          maxLength: 256
          description: Full filter name
        url:
          type: string
          maxLength: 512
          description: URL for filter info
        active:
          type: boolean
          default: true
          description: Whether the filter is active
    FilterUpdate:
      type: object
      properties:
        short_name:
          type: string
          maxLength: 8
          description: Short name (e.g. SG, CV)
        full_name:
          type: string
          maxLength: 256
          description: Full filter name
        url:
          type: string
          maxLength: 512
          description: URL for filter info
        active:
          type: boolean
          description: Whether the filter is active
    FilterResponse:
      type: object
      properties:
        status:
          type: boolean
          description: Operation status
        filter_id:
          type: integer
          description: Filter ID (on create)
        filter:
          $ref: '#/components/schemas/Filter'
        msg:
          type: string
          description: Status message
    ProjectSubframe:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        filter_id:
          type: integer
        filter:
          $ref: '#/components/schemas/Filter'
        exposure_time:
          type: number
          format: float
        goal_count:
          type: integer
          description: Target number of subframes
        active:
          type: boolean
    ProjectSubframeCreate:
      type: object
      required:
        - exposure_time
      description: Specify exactly one of filter (short name) or filter_id; not both.
      properties:
        filter:
          type: string
          description: Filter short name (looked up to get filter_id). Mutually exclusive with filter_id.
        filter_id:
          type: integer
          description: Filter ID. Mutually exclusive with filter.
        exposure_time:
          type: number
          format: float
        goal_count:
          type: integer
        active:
          type: boolean
          default: true
    ProjectSubframeUpdate:
      type: object
      description: filter and filter_id are mutually exclusive.
      properties:
        filter:
          type: string
          description: Filter short name (looked up to get filter_id). Mutually exclusive with filter_id.
        filter_id:
          type: integer
          description: Filter ID. Mutually exclusive with filter.
        exposure_time:
          type: number
          format: float
        goal_count:
          type: integer
        active:
          type: boolean
    Project:
      type: object
      properties:
        project_id:
          type: integer
        name:
          type: string
        description:
          type: string
        scope_id:
          type: integer
          description: Telescope (scope) ID for this project
        ra:
          type: number
          format: float
        decl:
          type: number
          format: float
        active:
          type: boolean
          description: Whether the project is active
        subframes:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSubframe'
        user_ids:
          type: array
          items:
            type: integer
          description: User IDs associated with the project
    ProjectCreate:
      type: object
      required:
        - name
        - scope_id
      properties:
        name:
          type: string
        scope_id:
          type: integer
          description: Telescope (scope) ID for this project
        description:
          type: string
        ra:
          type: number
          format: float
          description: RA (hours). Omit to resolve from catalog by name.
        decl:
          type: number
          format: float
          description: Declination (degrees). Omit to resolve from catalog by name.
        active:
          type: boolean
          default: true
    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        scope_id:
          type: integer
        ra:
          type: number
          format: float
        decl:
          type: number
          format: float
        active:
          type: boolean
    ProjectsList:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        pages:
          type: integer
    Telescope:
      type: object
      properties:
        scope_id:
          type: integer
          description: Telescope ID
        name:
          type: string
          description: Telescope name
        descr:
          type: string
          description: Telescope description
        min_dec:
          type: number
          format: float
          description: Minimum declination
        max_dec:
          type: number
          format: float
          description: Maximum declination
        focal:
          type: number
          format: float
          description: Focal length (mm)
        aperture:
          type: number
          format: float
          description: Aperture (mm)
        lon:
          type: number
          format: float
          description: Longitude
        lat:
          type: number
          format: float
          description: Latitude
        alt:
          type: number
          format: float
          description: Altitude
        sensor:
          $ref: '#/components/schemas/Sensor'
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
          description: Filters available on this telescope
        active:
          type: boolean
          description: Whether the telescope is active
    TelescopesList:
      type: object
      properties:
        telescopes:
          type: array
          items:
            $ref: '#/components/schemas/Telescope'
    ScopeCreate:
      type: object
      required: [name]
      properties:
        scope_id:
          type: integer
          description: Optional telescope ID; if omitted, next available scope_id is assigned
        name:
          type: string
          maxLength: 64
        descr:
          type: string
          maxLength: 1024
        min_dec:
          type: number
          format: float
        max_dec:
          type: number
          format: float
        focal:
          type: number
          format: float
        aperture:
          type: number
          format: float
        lon:
          type: number
          format: float
        lat:
          type: number
          format: float
        alt:
          type: number
          format: float
        sensor_id:
          type: integer
          description: Camera/sensor ID; use 0 or omit to leave unset
        active:
          type: boolean
          default: true
    ScopeUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
        descr:
          type: string
          maxLength: 1024
        min_dec:
          type: number
          format: float
        max_dec:
          type: number
          format: float
        focal:
          type: number
          format: float
        aperture:
          type: number
          format: float
        lon:
          type: number
          format: float
        lat:
          type: number
          format: float
        alt:
          type: number
          format: float
        sensor_id:
          type: integer
          description: Camera/sensor ID; use 0 to remove sensor
        active:
          type: boolean
    ScopeResponse:
      type: object
      properties:
        status:
          type: boolean
        scope_id:
          type: integer
          description: The telescope ID (assigned or provided)
        scope:
          $ref: '#/components/schemas/Telescope'
        msg:
          type: string
    Catalog:
      type: object
      properties:
        name:
          type: string
          description: Catalog name
        shortname:
          type: string
          description: Catalog short name
        filename:
          type: string
          description: Catalog filename
        descr:
          type: string
          description: Catalog description
        url:
          type: string
          description: Catalog URL
        version:
          type: string
          description: Catalog version
    Object:
      type: object
      properties:
        object_id:
          type: integer
          description: Object ID
        name:
          type: string
          description: Object name
        ra:
          type: number
          format: float
          description: Right Ascension
        decl:
          type: number
          format: float
          description: Declination
        descr:
          type: string
          description: Description
        comment:
          type: string
          description: Comment
        type:
          type: string
          description: Object type
        epoch:
          type: string
          description: Epoch
        const:
          type: string
          description: Constellation
        magn:
          type: number
          format: float
          description: Magnitude
        x:
          type: number
          format: float
          description: X coordinate
        y:
          type: number
          format: float
          description: Y coordinate
        altname:
          type: string
          description: Alternative name
        distance:
          type: number
          format: float
          description: Distance
        catalog:
          type: string
          description: Catalog short name
    NightPlanResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      description: List of tasks available for execution (no pagination)
    ObjectsList:
      type: object
      properties:
        objects:
          type: array
          items:
            $ref: '#/components/schemas/Object'
        total:
          type: integer
          description: Total number of objects
        page:
          type: integer
          description: Current page number
        per_page:
          type: integer
          description: Items per page
        pages:
          type: integer
          description: Total number of pages
paths:
  /api/version:
    get:
      summary: Get Hevelius version
      description: Returns the current version of the Hevelius software
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/login:
    post:
      summary: Login endpoint
      description: Returns user information if credentials are valid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Username
                password:
                  type: string
                  description: Password MD5 hash
              required:
                - username
                - password
      responses:
        '200':
          description: Login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/task-add:
    post:
      summary: Add new astronomical observation task
      description: Creates a new observation task with the specified parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - scope_id
                - ra
                - decl
              properties:
                user_id:
                  type: integer
                  description: User ID
                scope_id:
                  type: integer
                  description: Scope ID
                object:
                  type: string
                  maxLength: 64
                  description: Object name
                ra:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 24
                  description: Right Ascension (0-24)
                decl:
                  type: number
                  format: float
                  minimum: -90
                  maximum: 90
                  description: Declination (-90 to 90)
                exposure:
                  type: number
                  format: float
                  description: Exposure time (s)
                descr:
                  type: string
                  maxLength: 1024
                  description: Description (optional)
                filter:
                  type: string
                  maxLength: 16
                  description: Filter type
                binning:
                  type: integer
                  description: Binning value (1 - 1x1, 2 - 2x2, 3 - 3x3, 4 - 4x4)
                guiding:
                  type: boolean
                  default: true
                  description: Enable guiding
                dither:
                  type: boolean
                  default: false
                  description: Enable dithering
                calibrate:
                  type: boolean
                  description: Enable calibration
                solve:
                  type: boolean
                  description: Enable plate solving
                other_cmd:
                  type: string
                  maxLength: 512
                  description: Additional commands
                min_alt:
                  type: number
                  format: float
                  description: Minimum altitude
                moon_distance:
                  type: number
                  format: float
                  description: Minimum moon distance
                skip_before:
                  type: string
                  format: date-time
                  default: "2000-01-01T00:00:00"
                  description: Skip before date
                skip_after:
                  type: string
                  format: date-time
                  default: "3000-01-01T00:00:00"
                  description: Skip after date
                min_interval:
                  type: integer
                  description: Minimum interval
                comment:
                  type: string
                  description: Comment
                max_moon_phase:
                  type: integer
                  description: Maximum moon phase
                max_sun_alt:
                  type: integer
                  description: Maximum sun altitude
                state:
                  type: integer
                  description: Task state (0 - disabled, 1 - new)
                  enum: [0, 1]
                  default: 1
      responses:
        '200':
          description: Task creation response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  task_id:
                    type: integer
                  msg:
                    type: string
      security:
        - bearerAuth: []
  /api/tasks:
    get:
      summary: Get list of tasks
      description: Returns a paginated list of tasks with sorting and filtering
      parameters:
        - name: page
          in: query
          description: Page number (starting from 1)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: sort_by
          in: query
          description: Field to sort by
          required: false
          schema:
            type: string
            enum: [task_id, state, object, exposure, skip_before, skip_after, ra, decl, created, performed, user_id]
            default: task_id
        - name: sort_order
          in: query
          description: Sort order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: user_id
          in: query
          description: Filter by user ID
          required: false
          schema:
            type: integer
        - name: scope_id
          in: query
          description: Filter by telescope ID
          required: false
          schema:
            type: integer
        - name: object
          in: query
          description: Filter by object name (partial match)
          required: false
          schema:
            type: string
        - name: ra_min
          in: query
          description: Minimum RA value
          required: false
          schema:
            type: number
            format: float
        - name: ra_max
          in: query
          description: Maximum RA value
          required: false
          schema:
            type: number
            format: float
        - name: decl_min
          in: query
          description: Minimum declination value
          required: false
          schema:
            type: number
            format: float
        - name: decl_max
          in: query
          description: Maximum declination value
          required: false
          schema:
            type: number
            format: float
        - name: exposure
          in: query
          description: Filter by exposure time
          required: false
          schema:
            type: number
            format: float
        - name: descr
          in: query
          description: Filter by description (partial match)
          required: false
          schema:
            type: string
        - name: state
          in: query
          description: Filter by state
          required: false
          schema:
            type: integer
        - name: performed_after
          in: query
          description: Filter tasks performed after this time (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
        - name: performed_before
          in: query
          description: Filter tasks performed before this time (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of tasks with pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksList'
      security:
        - bearerAuth: []

    post:
      summary: Get list of tasks
      description: Returns a paginated list of tasks with sorting and filtering (body parameters)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: integer
                  default: 1
                  minimum: 1
                per_page:
                  type: integer
                  default: 100
                  minimum: 1
                  maximum: 1000
                sort_by:
                  type: string
                  enum: [task_id, state, object, exposure, skip_before, skip_after, ra, decl, created, performed, user_id]
                  default: task_id
                sort_order:
                  type: string
                  enum: [asc, desc]
                  default: desc
                user_id:
                  type: integer
                scope_id:
                  type: integer
                object:
                  type: string
                ra_min:
                  type: number
                  format: float
                ra_max:
                  type: number
                  format: float
                decl_min:
                  type: number
                  format: float
                decl_max:
                  type: number
                  format: float
                exposure:
                  type: number
                  format: float
                descr:
                  type: string
                state:
                  type: integer
                performed_after:
                  type: string
                  format: date-time
                performed_before:
                  type: string
                  format: date-time
      responses:
        '200':
          description: List of tasks with pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksList'
      security:
        - bearerAuth: []

  /api/task-get:
    get:
      summary: Get single task details
      description: Returns details of a specific astronomical observation task
      parameters:
        - name: task_id
          in: query
          description: Task ID to retrieve
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGetResponse'
      security:
        - bearerAuth: []

  /api/task-update:
    post:
      summary: Update existing astronomical observation task
      description: Updates an existing task with the specified parameters. Only provided fields will be updated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_id
              properties:
                task_id:
                  type: integer
                  description: Task ID to update
                user_id:
                  type: integer
                  description: User ID
                scope_id:
                  type: integer
                  description: Scope ID
                object:
                  type: string
                  maxLength: 64
                  description: Object name
                ra:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 24
                  description: Right Ascension (0-24)
                decl:
                  type: number
                  format: float
                  minimum: -90
                  maximum: 90
                  description: Declination (-90 to 90)
                exposure:
                  type: number
                  format: float
                  description: Exposure time
                descr:
                  type: string
                  maxLength: 1024
                  description: Description
                filter:
                  type: string
                  maxLength: 16
                  description: Filter type
                binning:
                  type: integer
                  description: Binning value
                guiding:
                  type: boolean
                  description: Enable guiding
                dither:
                  type: boolean
                  description: Enable dithering
                calibrate:
                  type: boolean
                  description: Enable calibration
                solve:
                  type: boolean
                  description: Enable plate solving
                other_cmd:
                  type: string
                  maxLength: 512
                  description: Additional commands
                min_alt:
                  type: number
                  format: float
                  description: Minimum altitude
                moon_distance:
                  type: number
                  format: float
                  description: Minimum moon distance
                skip_before:
                  type: string
                  format: date-time
                  description: Skip before date
                skip_after:
                  type: string
                  format: date-time
                  description: Skip after date
                min_interval:
                  type: integer
                  description: Minimum interval
                comment:
                  type: string
                  description: Comment
                max_moon_phase:
                  type: integer
                  description: Maximum moon phase
                max_sun_alt:
                  type: integer
                  description: Maximum sun altitude
      responses:
        '200':
          description: Task update response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskUpdateResponse'
