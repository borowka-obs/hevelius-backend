openapi: 3.0.2
info:
  title: Hevelius API
  version: v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter JWT token
  schemas:
    LoginResponse:
      type: object
      properties:
        status:
          type: boolean
        token:
          type: string
          description: JWT access token
        user_id:
          type: integer
        firstname:
          type: string
        lastname:
          type: string
        share:
          type: number
          format: float
        phone:
          type: string
        email:
          type: string
        permissions:
          type: integer
        aavso_id:
          type: string
        msg:
          type: string
    Task:
      type: object
      properties:
        task_id:
          type: integer
          description: Task ID
        user_id:
          type: integer
          description: User ID
        user_login:
          type: string
          nullable: true
          description: Task owner login
        aavso_id:
          type: string
          description: AAVSO identifier
        object:
          type: string
          description: Object name
        ra:
          type: number
          format: float
          description: Right Ascension
        decl:
          type: number
          format: float
          description: Declination
        exposure:
          type: number
          format: float
          description: Exposure time
        descr:
          type: string
          description: Description
        filter:
          type: string
          description: Filter type
        binning:
          type: integer
          description: Binning value
        guiding:
          type: boolean
          description: Guiding enabled
        dither:
          type: boolean
          description: Dithering enabled
        calibrate:
          type: boolean
          description: Calibration enabled
        solve:
          type: boolean
          description: Plate solving enabled
        other_cmd:
          type: string
          description: Additional commands
        min_alt:
          type: number
          format: float
          description: Minimum altitude
        moon_distance:
          type: number
          format: float
          description: Moon distance
        skip_before:
          type: string
          format: date-time
          description: Skip before date
        skip_after:
          type: string
          format: date-time
          description: Skip after date
        min_interval:
          type: integer
          description: Minimum interval
        comment:
          type: string
          description: Comment
        state:
          type: integer
          description: Task state
        scope_id:
          type: integer
          description: Telescope ID
        scope_name:
          type: string
          nullable: true
          description: Telescope name
        imagename:
          type: string
          description: Image filename
        created:
          type: string
          format: date-time
          description: Creation timestamp
        activated:
          type: string
          format: date-time
          description: Activation timestamp
        performed:
          type: string
          format: date-time
          description: Execution timestamp
        max_moon_phase:
          type: integer
          description: Maximum moon phase
        max_sun_alt:
          type: integer
          description: Maximum sun altitude
        auto_center:
          type: boolean
          description: Auto centering enabled
        calibrated:
          type: boolean
          description: Calibration status
        solved:
          type: boolean
          description: Plate solving status
        sent:
          type: boolean
          description: Sent status
        project_ids:
          type: array
          items:
            type: integer
          description: Project IDs this task belongs to
    TasksList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
          description: Total number of tasks
        page:
          type: integer
          description: Current page number
        per_page:
          type: integer
          description: Items per page
        pages:
          type: integer
          description: Total number of pages
    TaskFindByFilenameMatch:
      type: object
      required:
        - task_id
        - filename
      properties:
        task_id:
          type: integer
          description: Task ID
        filename:
          type: string
          nullable: true
          description: Stored file path (maps from DB column imagename)
    TaskFindByFilenameResponse:
      type: object
      required:
        - found
        - matches
      description: >
        Lookup result. Additional top-level properties may be added in future API versions;
        clients should ignore unknown fields.
      properties:
        found:
          type: boolean
          description: True if at least one task matched
        matches:
          type: array
          description: >
            Tasks whose stored path ends with the requested filename string (DB imagename).
            Multiple rows are returned when more than one task shares the same suffix.
          items:
            $ref: '#/components/schemas/TaskFindByFilenameMatch'
    TasksFilenameListResponse:
      type: object
      required:
        - rows
        - total
        - page
        - per_page
        - pages
      properties:
        rows:
          type: array
          description: >
            Compact rows as [task_id, filename]. filename is the stored path (DB imagename) and may be null.
          items:
            type: array
            minItems: 2
            maxItems: 2
        total:
          type: integer
          description: Total number of tasks
        page:
          type: integer
          description: Current page (1-based)
        per_page:
          type: integer
          description: Rows in this page
        pages:
          type: integer
          description: Total pages for the current per_page
    TaskGetResponse:
      type: object
      properties:
        task:
          $ref: '#/components/schemas/Task'
        status:
          type: boolean
          description: Operation status
        msg:
          type: string
          description: Status message
    VersionResponse:
      type: object
      properties:
        version:
          type: string
          description: Hevelius version number
    TaskUpdateResponse:
      type: object
      properties:
        status:
          type: boolean
          description: Operation status
        msg:
          type: string
          description: Status message
    Sensor:
      type: object
      properties:
        sensor_id:
          type: integer
          description: Sensor ID
        name:
          type: string
          description: Sensor name
        resx:
          type: integer
          description: Resolution in X axis (pixels)
        resy:
          type: integer
          description: Resolution in Y axis (pixels)
        pixel_x:
          type: number
          format: float
          description: Pixel size in X axis (microns)
        pixel_y:
          type: number
          format: float
          description: Pixel size in Y axis (microns)
        bits:
          type: integer
          description: Bit depth
        width:
          type: number
          format: float
          description: Sensor width (mm)
        height:
          type: number
          format: float
          description: Sensor height (mm)
        vendor:
          type: string
          description: Sensor/camera vendor
        url:
          type: string
          description: URL for sensor info
        active:
          type: boolean
          description: Whether the sensor is active
    SensorCreate:
      type: object
      required:
        - name
        - resx
        - resy
        - pixel_x
        - pixel_y
      properties:
        name:
          type: string
          maxLength: 128
          description: Sensor name
        resx:
          type: integer
          description: Resolution X (pixels)
        resy:
          type: integer
          description: Resolution Y (pixels)
        pixel_x:
          type: number
          format: float
          description: Pixel size X (microns)
        pixel_y:
          type: number
          format: float
          description: Pixel size Y (microns)
        bits:
          type: integer
          default: 0
          description: Bit depth (default 0 if omitted)
        width:
          type: number
          format: float
          description: Sensor width (mm); if omitted, computed as resx * pixel_x / 1000
        height:
          type: number
          format: float
          description: Sensor height (mm); if omitted, computed as resy * pixel_y / 1000
        vendor:
          type: string
          maxLength: 128
        url:
          type: string
          maxLength: 512
        active:
          type: boolean
          default: true
    SensorUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
        resx:
          type: integer
        resy:
          type: integer
        pixel_x:
          type: number
          format: float
        pixel_y:
          type: number
          format: float
        bits:
          type: integer
        width:
          type: number
          format: float
        height:
          type: number
          format: float
        vendor:
          type: string
          maxLength: 128
        url:
          type: string
          maxLength: 512
        active:
          type: boolean
    SensorResponse:
      type: object
      properties:
        status:
          type: boolean
        sensor_id:
          type: integer
        sensor:
          $ref: '#/components/schemas/Sensor'
        msg:
          type: string
    Filter:
      type: object
      properties:
        filter_id:
          type: integer
          description: Filter primary key
        short_name:
          type: string
          maxLength: 8
          description: Short name (e.g. SG, CV)
        full_name:
          type: string
          description: Full filter name
        url:
          type: string
          description: URL for filter info
        active:
          type: boolean
          description: Whether the filter is active
    FiltersList:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
    FilterCreate:
      type: object
      required:
        - short_name
      properties:
        short_name:
          type: string
          maxLength: 8
          description: Short name (e.g. SG, CV)
        full_name:
          type: string
          maxLength: 256
          description: Full filter name
        url:
          type: string
          maxLength: 512
          description: URL for filter info
        active:
          type: boolean
          default: true
          description: Whether the filter is active
    FilterUpdate:
      type: object
      properties:
        short_name:
          type: string
          maxLength: 8
          description: Short name (e.g. SG, CV)
        full_name:
          type: string
          maxLength: 256
          description: Full filter name
        url:
          type: string
          maxLength: 512
          description: URL for filter info
        active:
          type: boolean
          description: Whether the filter is active
    FilterResponse:
      type: object
      properties:
        status:
          type: boolean
          description: Operation status
        filter_id:
          type: integer
          description: Filter ID (on create)
        filter:
          $ref: '#/components/schemas/Filter'
        msg:
          type: string
          description: Status message
    ProjectSubframe:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        filter_id:
          type: integer
        filter:
          $ref: '#/components/schemas/Filter'
        exposure_time:
          type: number
          format: float
        count:
          type: integer
          description: Number of captured subframes (optional; defaults to 0)
        goal_count:
          type: integer
          description: Target number of subframes
        active:
          type: boolean
        last_updated:
          type: string
          format: date-time
          description: Timestamp of the last update (UTC); set by the server.
    ProjectSubframeCreate:
      type: object
      required:
        - exposure_time
      description: Specify exactly one of filter (short name) or filter_id; not both. count and goal_count are aliases.
      properties:
        filter:
          type: string
          description: Filter short name (looked up to get filter_id). Mutually exclusive with filter_id.
        filter_id:
          type: integer
          description: Filter ID. Mutually exclusive with filter.
        exposure_time:
          type: number
          format: float
        count:
          type: integer
          description: Optional alias for goal_count; defaults to 0 when omitted with goal_count
        goal_count:
          type: integer
          description: Optional alias for count; defaults to 0 when omitted with count
        active:
          type: boolean
          default: true
    ProjectSubframeUpdate:
      type: object
      description: |
        filter and filter_id are mutually exclusive. Each supplied field is
        updated independently — count and goal_count are NOT mirrored. The
        server stamps last_updated on every successful update.
      properties:
        filter:
          type: string
          description: Filter short name (looked up to get filter_id). Mutually exclusive with filter_id.
        filter_id:
          type: integer
          description: Filter ID. Mutually exclusive with filter.
        exposure_time:
          type: number
          format: float
        count:
          type: integer
          description: Number of captured subframes. Updates only this column.
        goal_count:
          type: integer
          description: Target number of subframes. Updates only this column.
        active:
          type: boolean
    Project:
      type: object
      properties:
        project_id:
          type: integer
        name:
          type: string
        description:
          type: string
        regexps:
          type: string
          nullable: true
          description: Optional regexp patterns for project matching
        scope_id:
          type: integer
          description: Telescope (scope) ID for this project
        ra:
          type: number
          format: float
        decl:
          type: number
          format: float
        active:
          type: boolean
          description: Whether the project is active
        last_updated:
          type: string
          format: date-time
          nullable: true
          description: Last time project subframes changed (UTC); maintained by the database
        total_integration_time:
          type: number
          format: float
          description: Total integration seconds (sum of exposure_time × subframe count per row); maintained when subframes change
        start_date:
          type: string
          format: date
          nullable: true
          description: Optional project start date (calendar date)
        end_date:
          type: string
          format: date
          nullable: true
          description: Optional project end date (calendar date)
        publications:
          type: string
          nullable: true
          description: Space-separated URLs of published media (social posts, galleries, etc.)
        rotation:
          type: number
          format: float
          nullable: true
          description: >
            Nominal camera position angle in degrees (0–360, East of North, same convention
            as the FITS PA keyword). null means not set. 0.0 means North up, no rotation.
        focal:
          type: number
          format: float
          nullable: true
          description: Focal length (mm) at the time the project was created; copied from the telescope's focal length.
        resx:
          type: integer
          nullable: true
          description: Sensor width in pixels; copied from the telescope's attached sensor at project creation.
        resy:
          type: integer
          nullable: true
          description: Sensor height in pixels; copied from the telescope's attached sensor at project creation.
        pixel_x:
          type: number
          format: float
          nullable: true
          description: Pixel pitch in X axis (µm); copied from the telescope's attached sensor at project creation.
        pixel_y:
          type: number
          format: float
          nullable: true
          description: Pixel pitch in Y axis (µm); copied from the telescope's attached sensor at project creation.
        subframes:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSubframe'
        user_ids:
          type: array
          items:
            type: integer
          description: User IDs associated with the project
    ProjectCreate:
      type: object
      required:
        - name
        - scope_id
      properties:
        name:
          type: string
        scope_id:
          type: integer
          description: Telescope (scope) ID for this project
        description:
          type: string
        regexps:
          type: string
          nullable: true
          description: Optional regexp patterns for project matching
        ra:
          type: number
          format: float
          description: RA (hours). Omit to resolve from catalog by name.
        decl:
          type: number
          format: float
          description: Declination (degrees). Omit to resolve from catalog by name.
        active:
          type: boolean
          default: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        publications:
          type: string
          nullable: true
          description: Space-separated publication URLs
        rotation:
          type: number
          format: float
          nullable: true
          description: >
            Nominal camera position angle in degrees (0–360, East of North).
            Auto-populated from the telescope's default_rotation when omitted, if set
            there; otherwise left unset. Supply explicitly to override.
        focal:
          type: number
          format: float
          nullable: true
          description: >
            Focal length (mm). Auto-populated from the telescope's focal when omitted.
            Supply explicitly to override (e.g. with a focal reducer).
        resx:
          type: integer
          nullable: true
          description: Sensor width (pixels). Auto-populated from the telescope's sensor when omitted.
        resy:
          type: integer
          nullable: true
          description: Sensor height (pixels). Auto-populated from the telescope's sensor when omitted.
        pixel_x:
          type: number
          format: float
          nullable: true
          description: Pixel pitch X (µm). Auto-populated from the telescope's sensor when omitted.
        pixel_y:
          type: number
          format: float
          nullable: true
          description: Pixel pitch Y (µm). Auto-populated from the telescope's sensor when omitted.
    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        regexps:
          type: string
          nullable: true
          description: Optional regexp patterns for project matching
        scope_id:
          type: integer
        ra:
          type: number
          format: float
        decl:
          type: number
          format: float
        active:
          type: boolean
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        publications:
          type: string
          nullable: true
          description: Space-separated publication URLs; send null or empty string to clear
        rotation:
          type: number
          format: float
          nullable: true
          description: >
            Nominal camera position angle in degrees (0–360, East of North).
            Send null to clear the value.
        focal:
          type: number
          format: float
          nullable: true
          description: Focal length (mm). Send null to clear.
        resx:
          type: integer
          nullable: true
          description: Sensor width (pixels). Send null to clear.
        resy:
          type: integer
          nullable: true
          description: Sensor height (pixels). Send null to clear.
        pixel_x:
          type: number
          format: float
          nullable: true
          description: Pixel pitch X (µm). Send null to clear.
        pixel_y:
          type: number
          format: float
          nullable: true
          description: Pixel pitch Y (µm). Send null to clear.
    ProjectsList:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        pages:
          type: integer
    ProjectStats:
      type: object
      description: Task statistics for a project
      properties:
        status:
          type: boolean
        project_id:
          type: integer
        total_tasks:
          type: integer
          description: Total number of tasks assigned to the project
        tasks_incomplete:
          type: integer
          description: Tasks with state != 6 (not done)
        tasks_done:
          type: integer
          description: Tasks with state == 6 (done)
        msg:
          type: string
    Telescope:
      type: object
      properties:
        scope_id:
          type: integer
          description: Telescope ID
        name:
          type: string
          description: Telescope name
        descr:
          type: string
          description: Telescope description
        min_dec:
          type: number
          format: float
          description: Minimum declination
        max_dec:
          type: number
          format: float
          description: Maximum declination
        focal:
          type: number
          format: float
          description: Focal length (mm)
        aperture:
          type: number
          format: float
          description: Aperture (mm)
        lon:
          type: number
          format: float
          description: Longitude
        lat:
          type: number
          format: float
          description: Latitude
        alt:
          type: number
          format: float
          description: Altitude
        sensor:
          $ref: '#/components/schemas/Sensor'
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
          description: Filters available on this telescope
        active:
          type: boolean
          description: Whether the telescope is active
        default_rotation:
          type: number
          format: float
          nullable: true
          description: >
            Default camera position angle in degrees (0–360, East of North) applied to
            new projects created on this telescope when their rotation is not specified.
            null means no default is set.
    TelescopesList:
      type: object
      properties:
        telescopes:
          type: array
          items:
            $ref: '#/components/schemas/Telescope'
    ScopeCreate:
      type: object
      required: [name]
      properties:
        scope_id:
          type: integer
          description: Optional telescope ID; if omitted, next available scope_id is assigned
        name:
          type: string
          maxLength: 64
        descr:
          type: string
          maxLength: 1024
        min_dec:
          type: number
          format: float
        max_dec:
          type: number
          format: float
        focal:
          type: number
          format: float
        aperture:
          type: number
          format: float
        lon:
          type: number
          format: float
        lat:
          type: number
          format: float
        alt:
          type: number
          format: float
        sensor_id:
          type: integer
          description: Camera/sensor ID; use 0 or omit to leave unset
        active:
          type: boolean
          default: true
        default_rotation:
          type: number
          format: float
          nullable: true
          description: >
            Default camera position angle in degrees (0–360, East of North) applied to
            new projects created on this telescope when their rotation is not specified.
    ScopeUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
        descr:
          type: string
          maxLength: 1024
        min_dec:
          type: number
          format: float
        max_dec:
          type: number
          format: float
        focal:
          type: number
          format: float
        aperture:
          type: number
          format: float
        lon:
          type: number
          format: float
        lat:
          type: number
          format: float
        alt:
          type: number
          format: float
        sensor_id:
          type: integer
          description: Camera/sensor ID; use 0 to remove sensor
        active:
          type: boolean
        default_rotation:
          type: number
          format: float
          nullable: true
          description: >
            Default camera position angle in degrees (0–360, East of North) for new
            projects on this telescope. Send null to clear.
    ScopeResponse:
      type: object
      properties:
        status:
          type: boolean
        scope_id:
          type: integer
          description: The telescope ID (assigned or provided)
        scope:
          $ref: '#/components/schemas/Telescope'
        msg:
          type: string
    Asteroid:
      type: object
      properties:
        asteroid_id:
          type: integer
          description: Asteroid ID
        number:
          type: integer
          nullable: true
          description: MPC number (null for unnumbered/provisional objects)
        designation:
          type: string
          description: Packed MPC designation
        name:
          type: string
          nullable: true
          description: Proper name (null if unnamed)
        epoch:
          type: string
          description: Epoch in MPC packed format
        mean_anomaly:
          type: number
          format: float
          description: Mean anomaly M at epoch (degrees)
        perihelion_arg:
          type: number
          format: float
          description: Argument of perihelion omega (degrees)
        ascending_node:
          type: number
          format: float
          description: Longitude of ascending node Omega (degrees)
        inclination:
          type: number
          format: float
          description: Orbital inclination i (degrees)
        eccentricity:
          type: number
          format: float
          description: Eccentricity e
        mean_motion:
          type: number
          format: float
          description: Mean daily motion n (degrees/day)
        semimajor_axis:
          type: number
          format: float
          description: Semi-major axis a (AU)
        absolute_magnitude:
          type: number
          format: float
          nullable: true
          description: Absolute magnitude H
        slope_parameter:
          type: number
          format: float
          nullable: true
          description: Phase slope parameter G
        tags:
          type: array
          description: Tags attached to this asteroid
          items:
            $ref: '#/components/schemas/AsteroidTag'
    AsteroidTag:
      type: object
      properties:
        tag_id:
          type: integer
          description: Tag ID
        name:
          type: string
          description: Tag name (e.g. amor, neo, pha)
        description:
          type: string
          nullable: true
          description: Tag description
        color:
          type: string
          nullable: true
          description: Display color (e.g. "#1976d2")
        asteroid_count:
          type: integer
          description: >
            Number of asteroids carrying this tag. Present on tag vocabulary
            endpoints (list/create/get/patch); omitted when tags are embedded
            on asteroid list/detail responses.
    AsteroidTagsList:
      type: object
      properties:
        tags:
          type: array
          items:
            $ref: '#/components/schemas/AsteroidTag'
    AsteroidTagCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 64
        description:
          type: string
          maxLength: 256
          nullable: true
        color:
          type: string
          maxLength: 16
          nullable: true
    AsteroidTagUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
        description:
          type: string
          maxLength: 256
          nullable: true
        color:
          type: string
          maxLength: 16
          nullable: true
    AsteroidTagCreateResponse:
      type: object
      properties:
        status:
          type: boolean
        tag_id:
          type: integer
        tag:
          $ref: '#/components/schemas/AsteroidTag'
        msg:
          type: string
    AsteroidTagResponse:
      type: object
      properties:
        status:
          type: boolean
        tag:
          $ref: '#/components/schemas/AsteroidTag'
        msg:
          type: string
    AsteroidsList:
      type: object
      properties:
        asteroids:
          type: array
          items:
            $ref: '#/components/schemas/Asteroid'
        total:
          type: integer
          description: Total number of asteroids
        page:
          type: integer
          description: Current page number
        per_page:
          type: integer
          description: Items per page
        pages:
          type: integer
          description: Total number of pages
    AsteroidResponse:
      type: object
      properties:
        status:
          type: boolean
        asteroid:
          $ref: '#/components/schemas/Asteroid'
        msg:
          type: string
    AsteroidVisibilitySample:
      type: object
      properties:
        time:
          type: string
          description: Sample time (UTC)
        altitude_deg:
          type: number
          format: float
          description: Altitude above the horizon (degrees)
        azimuth_deg:
          type: number
          format: float
          description: Azimuth (degrees, from North through East)
        apparent_magnitude:
          type: number
          format: float
          nullable: true
          description: Estimated apparent magnitude, if H is known
    AsteroidVisibilityResponse:
      type: object
      properties:
        status:
          type: boolean
        scope_id:
          type: integer
        scope_name:
          type: string
        night_start:
          type: string
          description: Start of the astronomical night (UTC)
        night_end:
          type: string
          description: End of the astronomical night (UTC)
        samples:
          type: array
          items:
            $ref: '#/components/schemas/AsteroidVisibilitySample'
        max_altitude_deg:
          type: number
          format: float
          description: Highest altitude reached during the night
        max_altitude_time:
          type: string
          description: Time of highest altitude (UTC)
        apparent_magnitude_at_max:
          type: number
          format: float
          nullable: true
        visible:
          type: boolean
          description: >
            True if max altitude during the night is above the geometric horizon
            (altitude > 0°); no airmass or site horizon mask is applied
        has_magnitude_estimate:
          type: boolean
          description: Whether absolute_magnitude (H) was available
        msg:
          type: string
    Catalog:
      type: object
      properties:
        name:
          type: string
          description: Catalog name
        shortname:
          type: string
          description: Catalog short name
        filename:
          type: string
          description: Catalog filename
        descr:
          type: string
          description: Catalog description
        url:
          type: string
          description: Catalog URL
        version:
          type: string
          description: Catalog version
    InstalledCatalog:
      type: object
      properties:
        name:
          type: string
          description: Catalog name
        shortname:
          type: string
          description: Catalog short name
        object_count:
          type: integer
          description: Number of objects loaded for this catalog
    CatalogsInstalledList:
      type: object
      properties:
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/InstalledCatalog'
    Object:
      type: object
      properties:
        object_id:
          type: integer
          description: Object ID
        name:
          type: string
          description: Object name
        ra:
          type: number
          format: float
          description: Right Ascension
        decl:
          type: number
          format: float
          description: Declination
        descr:
          type: string
          description: Description
        comment:
          type: string
          description: Comment
        type:
          type: string
          description: Object type
        epoch:
          type: string
          description: Epoch
        const:
          type: string
          description: Constellation
        magn:
          type: number
          format: float
          description: Magnitude
        x:
          type: number
          format: float
          description: X coordinate
        y:
          type: number
          format: float
          description: Y coordinate
        altname:
          type: string
          description: Alternative name
        distance:
          type: number
          format: float
          description: Distance
        catalog:
          type: string
          description: Catalog short name
    NightPlanResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      description: List of tasks available for execution (no pagination)
    ObjectsList:
      type: object
      properties:
        objects:
          type: array
          items:
            $ref: '#/components/schemas/Object'
        total:
          type: integer
          description: Total number of objects
        page:
          type: integer
          description: Current page number
        per_page:
          type: integer
          description: Items per page
        pages:
          type: integer
          description: Total number of pages
    UserLoginMapEntry:
      type: object
      description: Compact user_id to login mapping for resolving task owners without repeating usernames in large task lists
      properties:
        user_id:
          type: integer
        login:
          type: string
          nullable: true
          description: Login name (may be null for legacy rows)
    UsersLoginsResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserLoginMapEntry'
    UserAdminDetail:
      type: object
      description: Full user row without password fields; requires administrator permission (permissions bit 0)
      properties:
        user_id:
          type: integer
        login:
          type: string
          nullable: true
        firstname:
          type: string
          nullable: true
        lastname:
          type: string
          nullable: true
        share:
          type: number
          format: float
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        permissions:
          type: integer
        aavso_id:
          type: string
          nullable: true
        login_enabled:
          type: boolean
          description: True if pass_d is set (user can authenticate)
    UsersAdminListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserAdminDetail'
    PasswordResetComplete:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
          description: One-time token from administrator
        new_password:
          type: string
          minLength: 8
          description: New password (argon2id stored in pass_d)
    StatusMsg:
      type: object
      properties:
        status:
          type: boolean
        msg:
          type: string
    PasswordResetTokenIssue:
      type: object
      properties:
        status:
          type: boolean
        token:
          type: string
          description: Plain token; deliver securely to the user; not stored in DB
        expires_at:
          type: string
          format: date-time
        user_id:
          type: integer
        msg:
          type: string
    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        channel:
          type: string
          description: api or cli
        actor_user_id:
          type: integer
          nullable: true
        action:
          type: string
        target_user_id:
          type: integer
          nullable: true
        details:
          type: object
          nullable: true
          additionalProperties: true
    UsersAuditLogResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        pages:
          type: integer
paths:
  /api/version:
    get:
      summary: Get Hevelius version
      description: Returns the current version of the Hevelius software
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/auth/password-reset:
    post:
      summary: Complete password reset with admin-issued token
      description: |
        Sets pass_d from new_password using a one-time token returned by
        POST /api/users/{user_id}/password-reset-token. Does not require authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetComplete'
      responses:
        '200':
          description: Success or generic failure (same shape; check status field)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusMsg'
  /api/users/me:
    get:
      summary: Current user profile
      description: Returns the authenticated user's profile (no password fields).
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAdminDetail'
        '401':
          description: Missing or invalid JWT
        '404':
          description: User row missing
      security:
        - bearerAuth: []
  /api/users/audit-log:
    get:
      summary: User administration audit log
      description: |
        Paginated audit entries (CLI and API user-admin actions). Administrators only (permissions bit 0).
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersAuditLogResponse'
        '401':
          description: Missing or invalid JWT
        '403':
          description: Not an administrator
      security:
        - bearerAuth: []
  /api/users/logins:
    get:
      summary: User ID to login mapping
      description: |
        Returns all users as compact {user_id, login} pairs for resolving task user_id values
        without embedding usernames in large task payloads. Available to any authenticated user.
      responses:
        '200':
          description: Mapping of user IDs to logins
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersLoginsResponse'
        '401':
          description: Missing or invalid JWT
      security:
        - bearerAuth: []
  /api/users/{user_id}/password-reset-token:
    post:
      summary: Issue password reset token
      description: |
        Creates a one-time token (valid 1 hour). The plaintext token is returned only in this response.
        Administrators only (permissions bit 0).
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetTokenIssue'
        '401':
          description: Missing or invalid JWT
        '403':
          description: Not an administrator
        '404':
          description: User not found
      security:
        - bearerAuth: []
  /api/users:
    get:
      summary: List users (administrators)
      description: |
        Returns full user records except password fields (pass, pass_d). Requires JWT with
        permissions bit 0 set (administrator).
      responses:
        '200':
          description: Full user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersAdminListResponse'
        '401':
          description: Missing or invalid JWT
        '403':
          description: Caller does not have administrator permission (bit 0)
      security:
        - bearerAuth: []
  /api/login:
    post:
      summary: Login endpoint
      description: Returns user information if credentials are valid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Username
                password:
                  type: string
                  description: Password in plaintext (sent over HTTPS)
              required:
                - username
                - password
      responses:
        '200':
          description: Login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/login/refresh:
    post:
      summary: Refresh JWT access token
      description: Issues a new access token for the authenticated user (extends session on activity).
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Missing or invalid JWT
      security:
        - bearerAuth: []
  /api/task-add:
    post:
      summary: Add new astronomical observation task
      description: Creates a new observation task with the specified parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - ra
                - decl
              properties:
                user_id:
                  type: integer
                  description: User ID
                scope_id:
                  type: integer
                  description: Scope ID (optional if project_id is provided)
                object:
                  type: string
                  maxLength: 64
                  description: Object name
                ra:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 24
                  description: Right Ascension (0-24)
                decl:
                  type: number
                  format: float
                  minimum: -90
                  maximum: 90
                  description: Declination (-90 to 90)
                exposure:
                  type: number
                  format: float
                  description: Exposure time (s)
                descr:
                  type: string
                  maxLength: 1024
                  description: Description (optional)
                filter:
                  type: string
                  maxLength: 16
                  description: Filter type
                binning:
                  type: integer
                  description: Binning value (1 - 1x1, 2 - 2x2, 3 - 3x3, 4 - 4x4)
                guiding:
                  type: boolean
                  default: true
                  description: Enable guiding
                dither:
                  type: boolean
                  default: false
                  description: Enable dithering
                calibrate:
                  type: boolean
                  description: Enable calibration
                solve:
                  type: boolean
                  description: Enable plate solving
                other_cmd:
                  type: string
                  maxLength: 512
                  description: Additional commands
                min_alt:
                  type: number
                  format: float
                  description: Minimum altitude
                moon_distance:
                  type: number
                  format: float
                  description: Minimum moon distance
                skip_before:
                  type: string
                  format: date-time
                  default: "2000-01-01T00:00:00"
                  description: Skip before date
                skip_after:
                  type: string
                  format: date-time
                  default: "3000-01-01T00:00:00"
                  description: Skip after date
                min_interval:
                  type: integer
                  description: Minimum interval
                comment:
                  type: string
                  description: Comment
                max_moon_phase:
                  type: integer
                  description: Maximum moon phase
                max_sun_alt:
                  type: integer
                  description: Maximum sun altitude
                state:
                  type: integer
                  description: Task state (0 - disabled, 1 - new, 6 - done; if 6 then imagename is required)
                  enum: [0, 1, 6]
                  default: 1
                imagename:
                  type: string
                  description: Image filename (required when state=6)
                filter_id:
                  type: integer
                  description: Filter ID (optional alias for filter short_name; mutually exclusive with filter)
                project_id:
                  type: integer
                  description: Single project ID alias (mutually exclusive with project_ids)
                project_ids:
                  type: array
                  items:
                    type: integer
                  description: Project IDs this task belongs to (optional; default none)
            examples:
              basic:
                summary: Basic new task
                value:
                  user_id: 1
                  scope_id: 1
                  object: M31
                  ra: 0.712
                  decl: 41.27
                  exposure: 300
                  state: 1
              done_with_filename:
                summary: Create task directly in DONE state
                value:
                  user_id: 1
                  scope_id: 1
                  object: M31
                  ra: 0.712
                  decl: 41.27
                  state: 6
                  imagename: celestron/2026/04/m31.fits
              aliases_project_and_filter:
                summary: Use project_id and filter_id aliases (scope inferred from project)
                value:
                  user_id: 1
                  project_id: 42
                  filter_id: 3
                  object: M31
                  ra: 0.712
                  decl: 41.27
                  state: 6
                  imagename: celestron/2026/04/m31.fits
      responses:
        '200':
          description: Task creation response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  task_id:
                    type: integer
                  msg:
                    type: string
      security:
        - bearerAuth: []
  /api/tasks:
    get:
      summary: Get list of tasks
      description: Returns a paginated list of tasks with sorting and filtering
      parameters:
        - name: page
          in: query
          description: Page number (starting from 1)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: sort_by
          in: query
          description: Field to sort by
          required: false
          schema:
            type: string
            enum: [task_id, state, object, exposure, skip_before, skip_after, ra, decl, created, performed, user_id]
            default: task_id
        - name: sort_order
          in: query
          description: Sort order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: user_id
          in: query
          description: Filter by user ID
          required: false
          schema:
            type: integer
        - name: scope_id
          in: query
          description: Filter by telescope ID
          required: false
          schema:
            type: integer
        - name: object
          in: query
          description: Filter by object name (partial match)
          required: false
          schema:
            type: string
        - name: ra_min
          in: query
          description: Minimum RA value
          required: false
          schema:
            type: number
            format: float
        - name: ra_max
          in: query
          description: Maximum RA value
          required: false
          schema:
            type: number
            format: float
        - name: decl_min
          in: query
          description: Minimum declination value
          required: false
          schema:
            type: number
            format: float
        - name: decl_max
          in: query
          description: Maximum declination value
          required: false
          schema:
            type: number
            format: float
        - name: exposure
          in: query
          description: Filter by exposure time
          required: false
          schema:
            type: number
            format: float
        - name: descr
          in: query
          description: Filter by description (partial match)
          required: false
          schema:
            type: string
        - name: state
          in: query
          description: Filter by state
          required: false
          schema:
            type: integer
        - name: project_id
          in: query
          description: Filter by project ID (tasks assigned to this project)
          required: false
          schema:
            type: integer
        - name: performed_after
          in: query
          description: Filter tasks performed after this time (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
        - name: performed_before
          in: query
          description: Filter tasks performed before this time (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of tasks with pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksList'
      security:
        - bearerAuth: []

    post:
      summary: Get list of tasks
      description: Returns a paginated list of tasks with sorting and filtering (body parameters)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: integer
                  default: 1
                  minimum: 1
                per_page:
                  type: integer
                  default: 100
                  minimum: 1
                  maximum: 1000
                sort_by:
                  type: string
                  enum: [task_id, state, object, exposure, skip_before, skip_after, ra, decl, created, performed, user_id]
                  default: task_id
                sort_order:
                  type: string
                  enum: [asc, desc]
                  default: desc
                user_id:
                  type: integer
                scope_id:
                  type: integer
                object:
                  type: string
                ra_min:
                  type: number
                  format: float
                ra_max:
                  type: number
                  format: float
                decl_min:
                  type: number
                  format: float
                decl_max:
                  type: number
                  format: float
                exposure:
                  type: number
                  format: float
                descr:
                  type: string
                state:
                  type: integer
                project_id:
                  type: integer
                  description: Filter by project ID (tasks assigned to this project)
                performed_after:
                  type: string
                  format: date-time
                performed_before:
                  type: string
                  format: date-time
      responses:
        '200':
          description: List of tasks with pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksList'
      security:
        - bearerAuth: []

  /api/task-find-by-filename:
    get:
      summary: Find tasks by filename suffix
      description: >
        Returns tasks whose stored file path (DB imagename) ends with the given filename string.
        For example, filename `omega-centauri.fits` matches `celestron/2025/08/omega-centauri.fits`.
        SQL LIKE wildcards in the input are treated as literals.
      parameters:
        - name: filename
          in: query
          required: true
          description: Filename or suffix to match (1–256 characters)
          schema:
            type: string
            minLength: 1
            maxLength: 256
      responses:
        '200':
          description: Lookup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskFindByFilenameResponse'
      security:
        - bearerAuth: []

  /api/tasks-filename-list:
    get:
      summary: List task id and filename for all tasks (compact, paginated)
      description: >
        Returns every task as a compact [task_id, filename] row. filename is the stored path (DB imagename)
        and may be null. Ordered by task_id. Use pagination for large databases.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 2000
            minimum: 1
            maximum: 5000
      responses:
        '200':
          description: Paginated compact rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksFilenameListResponse'
      security:
        - bearerAuth: []

  /api/task-get:
    get:
      summary: Get single task details
      description: Returns details of a specific astronomical observation task
      parameters:
        - name: task_id
          in: query
          description: Task ID to retrieve
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGetResponse'
      security:
        - bearerAuth: []

  /api/task-update:
    post:
      summary: Update existing astronomical observation task
      description: Updates an existing task with the specified parameters. Only provided fields will be updated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_id
              properties:
                task_id:
                  type: integer
                  description: Task ID to update
                user_id:
                  type: integer
                  description: User ID
                scope_id:
                  type: integer
                  description: Scope ID
                object:
                  type: string
                  maxLength: 64
                  description: Object name
                ra:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 24
                  description: Right Ascension (0-24)
                decl:
                  type: number
                  format: float
                  minimum: -90
                  maximum: 90
                  description: Declination (-90 to 90)
                exposure:
                  type: number
                  format: float
                  description: Exposure time
                descr:
                  type: string
                  maxLength: 1024
                  description: Description
                filter:
                  type: string
                  maxLength: 16
                  description: Filter type
                binning:
                  type: integer
                  description: Binning value
                guiding:
                  type: boolean
                  description: Enable guiding
                dither:
                  type: boolean
                  description: Enable dithering
                calibrate:
                  type: boolean
                  description: Enable calibration
                solve:
                  type: boolean
                  description: Enable plate solving
                other_cmd:
                  type: string
                  maxLength: 512
                  description: Additional commands
                min_alt:
                  type: number
                  format: float
                  description: Minimum altitude
                moon_distance:
                  type: number
                  format: float
                  description: Minimum moon distance
                skip_before:
                  type: string
                  format: date-time
                  description: Skip before date
                skip_after:
                  type: string
                  format: date-time
                  description: Skip after date
                min_interval:
                  type: integer
                  description: Minimum interval
                comment:
                  type: string
                  description: Comment
                max_moon_phase:
                  type: integer
                  description: Maximum moon phase
                max_sun_alt:
                  type: integer
                  description: Maximum sun altitude
                state:
                  type: integer
                  description: Task state (0 - disabled, 1 - new, 6 - done; if resulting state is 6 then imagename must be present)
                  enum: [0, 1, 6]
                imagename:
                  type: string
                  description: Image filename
                filter_id:
                  type: integer
                  description: Filter ID (optional alias for filter short_name; mutually exclusive with filter)
                project_id:
                  type: integer
                  description: Single project ID alias (mutually exclusive with project_ids)
                project_ids:
                  type: array
                  items:
                    type: integer
                  description: Project IDs this task belongs to (replaces current list when provided)
            examples:
              partial_update:
                summary: Simple partial update
                value:
                  task_id: 123
                  exposure: 600
                  object: M33
              mark_done_with_filename:
                summary: Mark existing task DONE and set filename
                value:
                  task_id: 123
                  state: 6
                  imagename: celestron/2026/04/m33.fits
              aliases_project_and_filter:
                summary: Use project_id and filter_id aliases
                value:
                  task_id: 123
                  project_id: 42
                  filter_id: 3
                  state: 6
                  imagename: celestron/2026/04/m33.fits
      responses:
        '200':
          description: Task update response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskUpdateResponse'
